<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figurinhas da Copa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <h1>Figurinhas da Copa</h1>
            <p>Gerencie seu álbum com estilo e nunca mais cole figurinha repetida.</p>
        </header>
        
        <main class="dashboard">
            <div class="stats-card glass">
                <span class="label">Completado</span>
                <span class="value">0%</span>
            </div>
             <div class="stats-card glass">
                <span class="label">Faltantes</span>
                <span class="value">0</span>
            </div>
             <div class="stats-card glass">
                <span class="label">Repetidas</span>
                <span class="value">0</span>
            </div>
        </main>

        <section class="album-section">
            <h2 class="section-title">Navegação Rápida</h2>
            <div class="sticker-grid" id="sticker-grid">
                <!-- Stickers will be generated by JS -->
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
